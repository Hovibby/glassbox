name: Integration Tests – Cross-Platform Binary

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Matrix: Linux · macOS Intel · macOS Apple Silicon · Windows
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  integration:
    name: Integration / ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false          # run all platforms even if one fails
      matrix:
        include:
          - os: Linux
            runner: ubuntu-24.04
            binary_suffix: ""
            go_arch: amd64
            protocol_verify_script: scripts/verify_protocol_registration_linux.sh

          - os: macOS-Intel
            runner: macos-latest     # Intel runner (fallback to latest if 13 fails)
            binary_suffix: ""
            go_arch: amd64
            protocol_verify_script: scripts/verify_protocol_registration_macos.sh

          - os: macOS-Apple-Silicon
            runner: macos-latest     # M-series ARM runner
            binary_suffix: ""
            go_arch: arm64
            protocol_verify_script: scripts/verify_protocol_registration_macos.sh

          - os: Windows
            runner: windows-2022
            binary_suffix: ".exe"
            go_arch: amd64
            protocol_verify_script: scripts/verify_protocol_registration_windows.ps1

    env:
      # Allow the test suite to find the compiled binary without hard-coding a path.
      GLASSBOX_BINARY: ${{ github.workspace }}/Glassbox${{ matrix.binary_suffix }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Go toolchain ──────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── Rust toolchain (for the Soroban simulator) ─────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Reclaim runner temp space before Rust build
        run: bash ./scripts/ci-clean-build-space.sh

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: simulator -> target
          cache-targets: false

      # ── Build Glassbox binary ──────────────────────────────────────────────────
      - name: Build Glassbox (Go CLI)
        run: |
          go build -v -o "${{ env.GLASSBOX_BINARY }}" ./cmd/glassbox

      # ── Build Rust simulator ───────────────────────────────────────────────
      - name: Build glassbox-sim (Rust simulator)
        working-directory: simulator
        run: cargo build --release

      # ── Verify binary is executable ────────────────────────────────────────
      - name: Smoke-test binary (--version)
        run: ${{ env.GLASSBOX_BINARY }} --version

      # ── Unit tests (fast gate before integration) ─────────────────────────
      - name: Run Go unit tests
        run: go test -v -race ./...

      # ── Integration test suite ─────────────────────────────────────────────
      - name: Run integration tests
        run: |
          go test -v -race -timeout 120s ./integration/...
        env:
          GLASSBOX_BINARY: ${{ env.GLASSBOX_BINARY }}
          GLASSBOX_RUN_PROTOCOL_REGISTRATION_TESTS: "1"
          GLASSBOX_PROTOCOL_VERIFY_SCRIPT: ${{ github.workspace }}/${{ matrix.protocol_verify_script }}

      # ── Upload test results on failure ────────────────────────────────────
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: |
            **/*.log
            **/test-output.txt
          retention-days: 7

      - name: Reclaim runner temp space after tests
        if: always()
        run: bash ./scripts/ci-clean-build-space.sh

  # ─────────────────────────────────────────────────────────────────────────
  # Summary job – required status check for branch protection
  # ─────────────────────────────────────────────────────────────────────────
  integration-complete:
    name: Integration complete
    runs-on: ubuntu-24.04
    needs: integration
    if: always()
    steps:
      - name: Check all matrix jobs passed
        run: |
          if [ "${{ needs.integration.result }}" != "success" ]; then
            echo "One or more platform integration jobs failed."
            exit 1
          fi
          echo "All platform integration jobs passed."
